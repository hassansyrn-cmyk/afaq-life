<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#425F58">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="آفاق">
  <title>آفاق | تطوير الحياة</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="aurora aurora-1"></div><div class="aurora aurora-2"></div><div class="noise"></div>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="icon-btn back hidden" id="backBtn" aria-label="رجوع"></button>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M8 32h32M14 31c2.5-9 17.5-9 20 0M17 25c4-10 14-10 18 0" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></div>
        <div><strong id="topTitle">آفاق</strong><span>تطوير الحياة</span></div>
      </div>
      <div class="top-actions"><button class="icon-btn" id="searchBtn" aria-label="بحث"></button><button class="icon-btn" id="themeBtn" aria-label="الوضع الداكن"></button></div>
    </header>
    <main>
      <section id="home" class="screen active"></section>
      <section id="dashboard" class="screen"></section>
      <section id="daily" class="screen"></section>
      <section id="tools" class="screen"></section>
      <section id="habits" class="screen"></section>
      <section id="focus" class="screen"></section>
      <section id="mood" class="screen"></section>
      <section id="breath" class="screen"></section>
      <section id="reflection" class="screen"></section>
      <section id="gratitude" class="screen"></section>
      <section id="wheel" class="screen"></section>
      <section id="goals" class="screen"></section>
      <section id="matrix" class="screen"></section>
      <section id="energy" class="screen"></section>
      <section id="routine" class="screen"></section>
      <section id="journal" class="screen"></section>
      <section id="weekly" class="screen"></section>
      <section id="achievements" class="screen"></section>
      <section id="settings" class="screen"></section>
    </main>
  </div>
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" data-go="home"><span class="nav-ico"></span><small>الرئيسية</small></button>
    <button class="nav-btn" data-go="daily"><span class="nav-ico"></span><small>اليوم</small></button>
    <button class="nav-btn" data-go="tools"><span class="nav-ico"></span><small>الأدوات</small></button>
    <button class="nav-btn" data-go="dashboard"><span class="nav-ico"></span><small>التقدم</small></button>
    <button class="nav-btn" data-go="settings"><span class="nav-ico"></span><small>إعدادات</small></button>
  </nav>
  <div class="search-overlay" id="searchOverlay"><div class="search-box"><div class="search-head"><strong>بحث سريع</strong><button class="mini-btn" id="closeSearch">إغلاق</button></div><input id="searchInput" type="text" placeholder="ابحث عن: عادة، هدف، تركيز..."><div id="searchResults" class="search-results"></div></div></div>
  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
